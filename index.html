<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0b6f5b">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Finanzas">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta
      name="description"
      content="App personal de finanzas conductuales con monitoreo diario, presupuesto por periodos y simulador de ahorro."
    >
    <title>Finanzas Conductuales</title>
    <link rel="manifest" href="manifest.webmanifest?v=20260618-ui-system-v4">
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
    <link rel="stylesheet" href="styles.css?v=20260618-ui-system-v4">
    <script>
      const APP_VERSION = "20260618-ui-system-v4";
      const APP_CACHE_NAME = `finanzas-conductuales-${APP_VERSION}`;
      const hadServiceWorkerController = Boolean(navigator.serviceWorker?.controller);

      window.pwaCleanupReady = (async () => {
        if ("caches" in window) {
          try {
            const keys = await caches.keys();
            await Promise.all(
              keys
                .filter((key) => key.startsWith("finanzas-conductuales-") && key !== APP_CACHE_NAME)
                .map((key) => caches.delete(key))
            );
          } catch {}
        }

        if ("serviceWorker" in navigator) {
          let refreshingForUpdate = false;
          navigator.serviceWorker.addEventListener("controllerchange", () => {
            if (!hadServiceWorkerController || refreshingForUpdate) {
              return;
            }
            refreshingForUpdate = true;
            try {
              const reloadKey = `finanzas-reloaded-${APP_VERSION}`;
              if (sessionStorage.getItem(reloadKey) !== "done") {
                sessionStorage.setItem(reloadKey, "done");
                window.location.reload();
              }
            } catch {
              window.location.reload();
            }
          });

          window.addEventListener("load", () => {
            navigator.serviceWorker.register(`service-worker.js?v=${APP_VERSION}`).then((registration) => {
              const activateWaitingWorker = () => {
                if (registration.waiting) {
                  registration.waiting.postMessage({ type: "SKIP_WAITING" });
                }
              };
              activateWaitingWorker();
              registration.addEventListener("updatefound", () => {
                const worker = registration.installing;
                if (!worker) {
                  return;
                }
                worker.addEventListener("statechange", () => {
                  if (worker.state === "installed") {
                    worker.postMessage({ type: "SKIP_WAITING" });
                  }
                });
              });
              registration.update().catch(() => {});
            }).catch(() => {});
          });
        }
      })();
    </script>
  </head>
  <body>
    <div id="app" class="app-shell" aria-live="polite">
      <main class="startup-fallback">
        <section class="startup-fallback-card">
          <h1>Comprobando tu sesion</h1>
          <p>Estamos verificando automaticamente si ya tienes una sesion iniciada.</p>
        </section>
      </main>
    </div>
    <noscript>
      Esta aplicacion necesita JavaScript para guardar tu diagnostico y mostrar el tablero.
    </noscript>
    <script>
      window.pwaCleanupReady.then(async () => {
        const retryKey = "finanzas-startup-retry";
        window.setTimeout(() => {
          if (!document.querySelector(".startup-fallback")) {
            try {
              sessionStorage.removeItem(retryKey);
            } catch {}
            return;
          }
          let shouldRetry = false;
          try {
            shouldRetry = sessionStorage.getItem(retryKey) !== "done";
            sessionStorage.setItem(retryKey, "done");
          } catch {
            shouldRetry = !window.name.includes(retryKey);
            window.name = `${window.name} ${retryKey}`.trim();
          }
          if (shouldRetry) {
            window.location.reload();
          }
        }, 6000);

        const loadScript = (src, timeoutMs = 8000) =>
          new Promise((resolve) => {
            const script = document.createElement("script");
            let settled = false;
            const finish = () => {
              if (settled) {
                return;
              }
              settled = true;
              window.clearTimeout(timeout);
              resolve();
            };
            const timeout = window.setTimeout(finish, timeoutMs);
            script.src = src;
            script.onload = finish;
            script.onerror = finish;
            document.body.append(script);
          });

        await loadScript(`sync-config.js?v=${APP_VERSION}`);
        await loadScript(`vendor/supabase-2.108.1.min.js?v=${APP_VERSION}`);
        await import(`./app.js?v=${APP_VERSION}`);
      });
    </script>
  </body>
</html>
