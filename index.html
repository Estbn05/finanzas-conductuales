<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f6e56">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Finanzas">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta
      name="description"
      content="App personal de finanzas conductuales con monitoreo diario, presupuesto por periodos y simulador de ahorro."
    >
    <title>Finanzas Conductuales</title>
    <link rel="manifest" href="manifest.webmanifest?v=20260615-qa-fixes">
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
    <link rel="stylesheet" href="styles.css?v=20260615-qa-fixes">
    <script>
      window.pwaCleanupReady = Promise.resolve();
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("service-worker.js?v=20260615-qa-fixes").catch(() => {});
        });
      }
    </script>
  </head>
  <body>
    <div id="app" class="app-shell" aria-live="polite">
      <main class="startup-fallback">
        <section class="startup-fallback-card">
          <h1>Comprobando tu sesion</h1>
          <p>Estamos verificando automaticamente si ya tienes una sesion iniciada.</p>
        </section>
      </main>
    </div>
    <noscript>
      Esta aplicacion necesita JavaScript para guardar tu diagnostico y mostrar el tablero.
    </noscript>
    <script>
      window.pwaCleanupReady.then(async () => {
        const retryKey = "finanzas-startup-retry";
        window.setTimeout(() => {
          if (!document.querySelector(".startup-fallback")) {
            try {
              sessionStorage.removeItem(retryKey);
            } catch {}
            return;
          }
          let shouldRetry = false;
          try {
            shouldRetry = sessionStorage.getItem(retryKey) !== "done";
            sessionStorage.setItem(retryKey, "done");
          } catch {
            shouldRetry = !window.name.includes(retryKey);
            window.name = `${window.name} ${retryKey}`.trim();
          }
          if (shouldRetry) {
            window.location.reload();
          }
        }, 6000);

        const loadScript = (src, timeoutMs = 8000) =>
          new Promise((resolve) => {
            const script = document.createElement("script");
            let settled = false;
            const finish = () => {
              if (settled) {
                return;
              }
              settled = true;
              window.clearTimeout(timeout);
              resolve();
            };
            const timeout = window.setTimeout(finish, timeoutMs);
            script.src = src;
            script.onload = finish;
            script.onerror = finish;
            document.body.append(script);
          });

        await loadScript("sync-config.js?v=20260615-qa-fixes");
        await loadScript("vendor/supabase-2.108.1.min.js?v=20260615-qa-fixes");
        await import("./app.js?v=20260615-qa-fixes");
      });
    </script>
  </body>
</html>
