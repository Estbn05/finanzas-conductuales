<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#2d9b6f">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Finanzas">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta
      name="description"
      content="App personal de finanzas conductuales con monitoreo diario, presupuesto por periodos y simulador de ahorro."
    >
    <title>Finanzas Conductuales</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div id="app" class="app-shell" aria-live="polite">
      <main class="startup-fallback">
        <section class="startup-fallback-card">
          <h1>Iniciando Finanzas Conductuales</h1>
          <p>La aplicacion reintentara el inicio automaticamente.</p>
        </section>
      </main>
    </div>
    <noscript>
      Esta aplicacion necesita JavaScript para guardar tu diagnostico y mostrar el tablero.
    </noscript>
    <script>
      (() => {
        const retryKey = "finanzas-startup-retry";
        window.setTimeout(() => {
          if (!document.querySelector(".startup-fallback")) {
            try {
              sessionStorage.removeItem(retryKey);
            } catch {}
            return;
          }
          let shouldRetry = false;
          try {
            shouldRetry = sessionStorage.getItem(retryKey) !== "done";
            sessionStorage.setItem(retryKey, "done");
          } catch {
            shouldRetry = !window.name.includes(retryKey);
            window.name = `${window.name} ${retryKey}`.trim();
          }
          if (shouldRetry) {
            window.location.reload();
          }
        }, 6000);
      })();
    </script>
    <script src="sync-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js" type="module"></script>
  </body>
</html>
