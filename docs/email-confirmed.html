<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Correo confirmado - Finanzas Conductuales</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        max-width: 480px;
        margin: 0 auto;
        min-height: 100vh;
        min-height: 100dvh;
        padding: 32px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        line-height: 1.6;
        color: #1c231f;
        background: #fbfaf6;
      }
      .icon {
        width: 72px;
        height: 72px;
        border-radius: 20px;
        background: linear-gradient(145deg, #7ee8c4, #47d6a6);
        display: grid;
        place-items: center;
        margin-bottom: 24px;
        box-shadow: 0 12px 30px rgba(71, 214, 166, 0.35);
      }
      .icon svg { width: 36px; height: 36px; }
      h1 { font-size: 1.5rem; margin: 0 0 12px; }
      p { color: #4a544d; margin: 0 0 8px; }
      .hint {
        margin-top: 28px;
        padding: 14px 18px;
        border-radius: 12px;
        background: #eef3ef;
        font-size: 0.92rem;
        color: #384039;
      }
      footer { margin-top: 40px; font-size: 0.8rem; color: #8a938c; }
      @media (prefers-color-scheme: dark) {
        body { background: #0c1210; color: #e7ece8; }
        p { color: #b7c2bc; }
        .hint { background: #17211c; color: #cfd8d2; }
        footer { color: #6b756f; }
      }
    </style>
  </head>
  <body>
    <div class="icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M5 13l4 4L19 7" stroke="#0b3b30" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h1>Tu correo quedó confirmado</h1>
    <p>Ya puedes volver a la app Finanzas Conductuales.</p>
    <p>Abre la aplicación en tu teléfono e inicia sesión con tu correo y contraseña.</p>
    <div class="hint">Puedes cerrar esta pestaña, ya no la necesitas.</div>
    <footer>Finanzas Conductuales</footer>
  </body>
</html>
