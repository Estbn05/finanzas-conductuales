<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Restablecer contraseña - Finanzas Conductuales</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        max-width: 420px;
        margin: 0 auto;
        min-height: 100vh;
        min-height: 100dvh;
        padding: 32px 20px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        line-height: 1.6;
        color: #1c231f;
        background: #fbfaf6;
      }
      .icon {
        width: 64px;
        height: 64px;
        border-radius: 18px;
        background: linear-gradient(145deg, #7ee8c4, #47d6a6);
        display: grid;
        place-items: center;
        margin: 0 auto 20px;
      }
      .icon svg { width: 30px; height: 30px; }
      h1 { font-size: 1.4rem; margin: 0 0 8px; text-align: center; }
      p.lead { color: #4a544d; margin: 0 0 24px; text-align: center; font-size: 0.94rem; }
      label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; }
      input[type="password"] {
        width: 100%;
        box-sizing: border-box;
        padding: 12px 14px;
        margin-bottom: 16px;
        border: 1px solid #d8dcd8;
        border-radius: 10px;
        font-size: 1rem;
        background: #fff;
        color: #1c231f;
      }
      button {
        width: 100%;
        padding: 13px;
        border: 0;
        border-radius: 10px;
        background: linear-gradient(145deg, #7ee8c4, #47d6a6);
        color: #0b3b30;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
      }
      button:disabled { opacity: 0.6; cursor: default; }
      .msg {
        margin-top: 18px;
        padding: 12px 14px;
        border-radius: 10px;
        font-size: 0.9rem;
        text-align: center;
        display: none;
      }
      .msg.show { display: block; }
      .msg.ok { background: #e3f3ec; color: #0b6f5b; }
      .msg.err { background: #ffe4df; color: #8c2d25; }
      footer { margin-top: 28px; font-size: 0.8rem; color: #8a938c; text-align: center; }
      @media (prefers-color-scheme: dark) {
        body { background: #0c1210; color: #e7ece8; }
        p.lead { color: #b7c2bc; }
        input[type="password"] { background: #17211c; border-color: #2b332d; color: #e7ece8; }
        .msg.ok { background: #123024; color: #6ee0bf; }
        .msg.err { background: #3a1a16; color: #ff9d8f; }
        footer { color: #6b756f; }
      }
    </style>
  </head>
  <body>
    <div class="icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0b3b30" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="5" y="10.5" width="14" height="9.5" rx="2.5"/><path d="M8 10.5V8a4 4 0 0 1 8 0v2.5"/><circle cx="12" cy="15" r="1.4" fill="#0b3b30" stroke="none"/>
      </svg>
    </div>
    <h1>Elige tu nueva contraseña</h1>
    <p class="lead" id="lead">Escribe una contraseña nueva para tu cuenta de Finanzas Conductuales.</p>

    <form id="reset-form">
      <label for="password">Nueva contraseña</label>
      <input id="password" name="password" type="password" minlength="6" placeholder="Mínimo 6 caracteres" required autocomplete="new-password">
      <label for="password2">Confirmar contraseña</label>
      <input id="password2" name="password2" type="password" minlength="6" placeholder="Repite la contraseña" required autocomplete="new-password">
      <button type="submit" id="submit-btn">Guardar contraseña</button>
    </form>
    <p class="msg" id="msg"></p>
    <footer>Finanzas Conductuales</footer>

    <script src="supabase-2.108.1.min.js"></script>
    <script>
      const SUPABASE_URL = "https://wqehrsxrxqwmmtljqsbb.supabase.co";
      const SUPABASE_ANON_KEY = "sb_publishable_TIEznfphuyXQxyUDz6BtFg_MT4mhFfA";
      const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: { detectSessionInUrl: true, persistSession: false, autoRefreshToken: false }
      });

      const form = document.getElementById("reset-form");
      const submitBtn = document.getElementById("submit-btn");
      const msg = document.getElementById("msg");
      const lead = document.getElementById("lead");

      function showMsg(text, kind) {
        msg.textContent = text;
        msg.className = "msg show " + kind;
      }

      let hasRecoverySession = false;
      client.auth.onAuthStateChange((event, session) => {
        if (event === "PASSWORD_RECOVERY" || (event === "SIGNED_IN" && session)) {
          hasRecoverySession = true;
        }
      });

      // Si Supabase no reconoce un token de recuperacion valido en la URL, avisar
      // en vez de dejar que el usuario llene el formulario para nada.
      setTimeout(() => {
        if (!hasRecoverySession) {
          lead.textContent = "Este enlace ya no es valido o ya se uso. Pide uno nuevo desde la app (¿Olvidaste tu contraseña?).";
          form.style.display = "none";
        }
      }, 1500);

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const password = document.getElementById("password").value;
        const password2 = document.getElementById("password2").value;

        if (password.length < 6) {
          showMsg("La contraseña debe tener al menos 6 caracteres.", "err");
          return;
        }
        if (password !== password2) {
          showMsg("Las dos contraseñas no coinciden.", "err");
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = "Guardando...";
        const { error } = await client.auth.updateUser({ password });
        submitBtn.disabled = false;
        submitBtn.textContent = "Guardar contraseña";

        if (error) {
          showMsg("No pudimos guardar la contraseña: " + error.message, "err");
          return;
        }
        form.style.display = "none";
        lead.textContent = "";
        showMsg("Tu contraseña se actualizó. Ya puedes cerrar esta página y volver a la app para iniciar sesión.", "ok");
        client.auth.signOut().catch(() => {});
      });
    </script>
  </body>
</html>
